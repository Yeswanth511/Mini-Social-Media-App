<html>
<head>

</head>

        <h1>Dashboard</h1>
        <hr>

        <p>One Piece is the best anime 🔥</p>

        <hr>

        <strong>@Yuno</strong>
        <p>Naruto is the best anime 🍥</p>
    </div>

    <div class="profile">
        <h2>Profile</h2>

        <h3>Age : 20</h3>
    </div>

</body>
</html>
